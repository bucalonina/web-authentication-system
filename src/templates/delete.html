{% extends 'base_for_pages.html' %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
    }

    .container {
        max-width: 600px;
        margin: 100px auto;
        padding: 20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    h1 {
        margin-top: 0;
        color: #333;
    }

    .buttons {
        margin-top: 20px;
    }

    .buttons button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s;
    }

    .buttons .confirm {
        background-color: #4CAF50;
        color: white;
    }

    .buttons .return {
        background-color: #f44336;
        color: white;
    }

    .buttons .confirm:hover {
        background-color: #45a049;
    }

    .buttons .return:hover {
        background-color: #e53935;
    }

    .confirm-delete {
        display: none;
        margin-top: 20px;
        padding: 20px;
        background-color: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
        border-radius: 5px;
    }

    .profile_user_all {
        position: relative;
        text-align: center;
        margin-bottom: 20px;
    }

    .profile-picture2 {
        border-radius: 50%;
        width: 150px;
        height: 150px;
        object-fit: cover;
    }

    @media (min-width: 768px) {
        .profile-picture2 {
            width: 200px;
            height: 200px;
        }
    }
</style>
<body>
    <div class="profile_user_all">
        {% if user.picture %}
            <img src="{{ user.picture.url }}" alt="{{ user.username }}'s profile picture" class="profile-picture2">
        {% else %}
            <img src="/media/default_avatar.jpg" alt="Default profile picture" class="profile-picture2">
        {% endif %}
    </div>

    <div class="container">
        <h1>Delete Profile</h1>
        <div class="buttons">
            <button class="confirm" onclick="showConfirm()">Yes</button>
            <button class="return" onclick="goBack()">Return to the previous page</button>
        </div>
        <div class="confirm-delete" id="confirmDelete">
            <p>Are you sure you want to delete your profile?</p>
            <button class="confirm" onclick="confirmDelete()">Confirm</button>
            <button class="return" onclick="hideConfirm()">Cancel</button>
        </div>
    </div>
</body>
<script>
    function showConfirm() {
        document.getElementById('confirmDelete').style.display = 'block';
    }

    function hideConfirm() {
        document.getElementById('confirmDelete').style.display = 'none';
    }

    function confirmDelete() {
        // Poziv funkcije za brisanje korisnika
        var userId = 1; // Zamislite da je ovo ID korisnika koji se briše
        window.location.href = `/delete_user/${userId}/`; // Promenite putanju prema vašoj funkciji za brisanje korisnika
    }

    function goBack() {
        window.history.back();
    }
</script>
{% endblock %}
